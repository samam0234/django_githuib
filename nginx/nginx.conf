# nginx/nginx.conf

# 요청을 전달할 Django(Gunicorn) 서버 지정
# 'web'은 docker-compose.yml의 서비스 이름
# Docker 내부 네트워크에서 서비스 이름으로 접근합니다
upstream django {
    server web:8000;
}

server {
    listen 80;              # 80번 포트에서 HTTP 요청 수신
    server_name localhost;

    # ── 정적 파일 (CSS, JS, 이미지) ──────────────────
    location /static/ {
        alias /app/staticfiles/;  # static_volume이 마운트된 경로
        expires 30d;              # 브라우저 캐시 30일
        add_header Cache-Control "public";
    }

    # ── 미디어 파일 (사용자 업로드) ──────────────────
    location /media/ {
        alias /app/media/;        # media_volume이 마운트된 경로
    }

    # ── 그 외 모든 요청 → Django로 전달 ──────────────
    location / {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 파일 업로드 최대 크기 제한 (기본 1MB → 20MB)
        client_max_body_size 20M;
    }
}

