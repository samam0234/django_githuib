{% extends '../base.html' %}
{% block title %}게시글 상세{% endblock %}
{% block content %}

<div class="card">
    <div class="card-header">
        <h4 class="mb-0">{{ post.title }}</h4>
    </div>
    <div class="card-body">
        <p class="text-muted mb-3">
            {{ post.created_at }}
        </p>
        <hr>
        <p>{{ post.content|linebreaks }}</p>
    </div>

    {% if post.attachment %}
    <div class="mt-4">
      <label class="form-label fw-bold">첨부파일:</label>
      <a href="{{ post.attachment.url }}" class="btn btn-outline-primary ms-2" download>
        {{ post.attachment.name }}
      </a>
    </div>
     {% endif %}

    <div class="card-footer text-end">
        <a href="/board/" class="btn btn-secondary">목록으로</a>
        <a href="#" class="btn btn-warning">수정</a>
        <a href="#" class="btn btn-danger">삭제</a>
    </div>
</div>

{% endblock %}
