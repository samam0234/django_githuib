{% extends '../base.html' %} 
{% block title %}게시판 목록{% endblock %} 
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>📋 게시판</h2>
  <a href="/board/create" class="btn btn-primary">✏️ 글쓰기</a>
</div>

<table class="table table-hover">
  <thead class="table-dark">
    <tr>
      <th style="width: 5%">번호</th>
      <th>제목</th>
      <th style="width: 10%">조회수</th>
      <th style="width: 20%">작성일시</th>
    </tr>
  </thead>
  <tbody>
    {% for post in posts %}
    <tr>
      <td>{{ post.id }}</td>
      <td><a href="/board/{{ post.id}}" class="text-decoration-none">{{ post.title }}</a></td>
      <td>{{ post.view_count }}</td>
      <td>{{ post.created_at|date:"Y/m/d H:i" }}</td>
    </tr>
    {% empty %}
    <tr>
      <td colspan="4" class="text-center py-4 text-muted">
        📭 게시글이 없습니다.
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
